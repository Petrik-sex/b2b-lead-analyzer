name: Finalize B2B Lead Analyzer

on:
  push:
    paths:
      - '.github/workflows/finalize-b2b-app.yml'

permissions:
  contents: write

jobs:
  finalize:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install completed application files
        shell: bash
        run: |
          printf '%s' '' | base64 --decode > /tmp/b2b-final-files.tgz
          tar -xzf /tmp/b2b-final-files.tgz
          git rm .github/workflows/finalize-b2b-app.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add README.md app components lib supabase
          git commit -m "Complete automated lead analysis workflow"
          git push
