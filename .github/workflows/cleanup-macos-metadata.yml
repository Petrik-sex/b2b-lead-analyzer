name: Clean macOS metadata

on:
  push:
    paths:
      - '.github/workflows/cleanup-macos-metadata.yml'

permissions:
  contents: write

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Remove metadata files
        shell: bash
        run: |
          find . -name '._*' -type f -delete
          git rm .github/workflows/cleanup-macos-metadata.yml
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Remove macOS metadata files"
          git push
